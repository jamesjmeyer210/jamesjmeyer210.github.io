<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/spectre.min.css"> 
    <link rel="stylesheet" href="css/spectre-exp.min.css">
    <link rel="stylesheet" href="css/spectre-icons.min.css">
    <title>James Meyer</title>
</head>
</body>
    <div class="container">
        <nav id="nav" style="border-color: #3634d2; border-width: 2px; border-style: solid; border-radius: 4px;">
            <header class="navbar" style="margin: 1rem;">
                <section class="navbar-section">
                    <a href="#" class="btn btn-link">Resume</a>
                    <a href="#" class="btn btn-link">Blog</a>
                    <a href="#" class="btn btn-link">Contact</a>
                </section>
                <section class="navbar-center">
                    <a href="#" class="navbar-brand mr-2 text-bold">James J Meyer</a>
                </section>
                <section class="navbar-section">
                    <div class="input-group input-inline">
                        <input class="form-input" type="text" placeholder="search">
                        <button class="btn btn-primary input-group-btn">Search</button>
                      </div>
                </section>
            </header>
        </nav>
        <div class="columns" style="margin-top: 2rem; margin-bottom: 2rem;">
            <div class="column col-4">
                <div class="text-right">
                    Loading...
                </div>
            </div>
            <div class="column col-8">
                <div class="text-left">
                    Retrieved: something.html
                </div>
            </div>
        </div>   
        <div class="columns" style="margin-top: 2rem; margin-bottom: 2rem;">
            <div class="column col-2"></div>
            <div class="column col-8 text-center">
                <div class="bar">

                </div>
            </div>
            <div class="column col-2"></div>
        </div>
        <footer class="container" style="position: fixed; left: 0; bottom: 0;">
            <p>Created by James Meyer</p>
        </footer>
    </div>
    <script>
        'use strict';

        const manifest = {
            resume: "site/resume.html",
            contact: "site/contact.html",
            blogs: "site/blog.html",
        };

        const retrieve = (resource) => {
            fetch(resource)
                .then(response => {
                    if(!response.ok) {
                        throw new Error(`Error retrieving ${resource}\nHttp status: ${response.status}`);
                    }
                    return response.text();
                })
                .then(text => {
                    console.log("Success!");
                });
        };

        Object.values(manifest).forEach(value => {
            retrieve(value);
        });
    </script>
</body>
</html>
